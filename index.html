    <div id="print-area" class="print-page">
        <div class="flex justify-between items-end mb-8">
            <div class="text-right w-full">
                <div class="text-lg">なまえ：____________________________________</div>
            </div>
        </div>

        <div id="questions-container" class="question-grid">
            <!-- JavaScriptで生成 -->
        </div>
    </div>

    <script>
        let currentQuestionsData = [];

        // 経過時間をテキスト化するヘルパー
        const formatDuration = (minutes) => {
            if (minutes < 60) {
                return `${minutes}分`;
            } else {
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                if (m === 0) return `${h}時間`;
                return `${h}時間${m}分`;
            }
        };

        // 時刻をテキスト化するヘルパー
        const formatTime = (h, m) => {
            return `${h}時${m === 0 ? '' : m + '分'}`;
        };

        // 12時間制で時刻を分に変換 (計算用)
        const timeToMin = (h, m) => {
            return (h % 12) * 60 + m;
        };

        // 分を12時間制の時刻に変換 (計算用)
        const minToTime = (minutes) => {
            minutes = (minutes + 12 * 60 * 10) % (12 * 60); // 負の数を防ぐ
            let h = Math.floor(minutes / 60);
            if (h === 0) h = 12;
            let m = minutes % 60;
            return { h, m };
        };

        // 時計のSVGを描画
        function createClockSVG(hour, minute) {
            const hDegree = (hour % 12) * 30 + (minute / 60) * 30;
            const mDegree = minute * 6;
            
            let marks = '';
            for (let i = 0; i < 60; i++) {
                const angle = i * 6 * Math.PI / 180;
                const isFive = i % 5 === 0;
                const r1 = isFive ? 40 : 42;
                const r2 = 45;
                const x1 = 50 + r1 * Math.sin(angle);
                const y1 = 50 - r1 * Math.cos(angle);
                const x2 = 50 + r2 * Math.sin(angle);
                const y2 = 50 - r2 * Math.cos(angle);
                marks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="black" stroke-width="${isFive ? 1.5 : 0.5}" />`;
            }

            let numbers = '';
            for (let i = 1; i <= 12; i++) {
                const angle = i * 30 * Math.PI / 180;
                const x = 50 + 33.5 * Math.sin(angle);
                const y = 50 - 33.5 * Math.cos(angle) + 3;
                numbers += `<text x="${x}" y="${y}" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="500">${i}</text>`;
            }
            
            return `
                <svg viewBox="0 0 100 100" class="w-full h-full">
                    <circle cx="50" cy="50" r="46" fill="none" stroke="black" stroke-width="1" />
                    ${marks}
                    ${numbers}
                    <line x1="50" y1="50" x2="${50 + 22 * Math.sin(hDegree * Math.PI / 180)}" y2="${50 - 22 * Math.cos(hDegree * Math.PI / 180)}" stroke="black" stroke-width="2.5" stroke-linecap="round" />
                    <line x1="50" y1="50" x2="${50 + 38 * Math.sin(mDegree * Math.PI / 180)}" y2="${50 - 38 * Math.cos(mDegree * Math.PI / 180)}" stroke="black" stroke-width="1.5" stroke-linecap="round" />
                    <circle cx="50" cy="50" r="2" fill="black" />
                </svg>
            `;
        }

        // 時刻の選択肢を生成（正解とダミー）
        function generateTimeChoices(targetTime) {
            const correctStr = formatTime(targetTime.h, targetTime.m);
            const choicesSet = new Set([correctStr]);
            const targetTotal = timeToMin(targetTime.h, targetTime.m);

            // よくある計算ミスをダミーとして追加 (±1時間, ±10分, ±5分など)
            const offsets = [60, -60, 10, -10, 5, -5, 30, -30];
            for (let offset of offsets) {
                const dummyTime = minToTime(targetTotal + offset);
                choicesSet.add(formatTime(dummyTime.h, dummyTime.m));
                if (choicesSet.size >= 4) break;
            }

            // 万が一4つに満たない場合のフォールバック
            let fallback = 1;
            while(choicesSet.size < 4) {
                const dummyTime = minToTime(targetTotal + fallback);
                choicesSet.add(formatTime(dummyTime.h, dummyTime.m));
                fallback++;
            }

            const choicesArr = Array.from(choicesSet).slice(0, 4);
            return choicesArr.sort(() => Math.random() - 0.5);
        }

        // 問題データを作成
        function generateDataAndRender() {
            const qCountEl = document.querySelector('input[name="qCount"]:checked');
            const stepEl = document.querySelector('input[name="step"]:checked');
            const timeRangeEl = document.querySelector('input[name="timeRange"]:checked');
            const directionEl = document.querySelector('input[name="direction"]:checked');

            if (!qCountEl || !stepEl || !timeRangeEl || !directionEl) return;

            const qCount = parseInt(qCountEl.value);
            const step = parseInt(stepEl.value);
            const timeRange = parseInt(timeRangeEl.value);
            const direction = directionEl.value;

            currentQuestionsData = [];

            for (let i = 0; i < qCount; i++) {
                let diff;
                
                // 差分の時間（経過時間）を決める
                // timeRange（最大時間）の範囲内で、stepごとのランダムな値を選ぶ
                let maxStepCount = Math.floor(timeRange / step);
                // 例：10分きざみで「5分まで」が選ばれた場合などのための補正（最低でも1回分のstepをとる）
                if (maxStepCount < 1) maxStepCount = 1; 

                // 1 から maxStepCount までのランダムな整数
                let randomStepCount = Math.floor(Math.random() * maxStepCount) + 1;
                diff = randomStepCount * step;

                // 前か後かを決める
                let isAfter;
                if (direction === 'mixed') {
                    isAfter = Math.random() > 0.5;
                } else {
                    isAfter = (direction === 'after');
                }

                // 開始時刻(timeA)をランダムに決定
                let startTotalMinutes = Math.floor(Math.random() * (12 * 60 / step)) * step;
                let timeA = minToTime(startTotalMinutes);

                // 答えの時刻(timeB)を計算
                let endTotalMinutes = startTotalMinutes + (isAfter ? diff : -diff);
                let timeB = minToTime(endTotalMinutes);

                // 選択肢の生成
                const choices = generateTimeChoices(timeB);

                currentQuestionsData.push({
                    id: i + 1,
                    timeA,
                    timeB,
                    diff,
                    isAfter,
                    choices
                });
            }

            renderWorksheet();
        }

        // 保持している問題データをもとにHTMLを描画
        function renderWorksheet() {
            const container = document.getElementById('questions-container');
            if (!container || currentQuestionsData.length === 0) return;
            container.innerHTML = '';

            const format = document.querySelector('input[name="format"]:checked').value;
            const display = document.querySelector('input[name="display"]:checked').value;

            currentQuestionsData.forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.className = 'p-4 flex flex-col items-start border-b border-gray-200 border-dashed last:border-0 pb-6';
                
                const timeAText = formatTime(q.timeA.h, q.timeA.m);
                const diffText = formatDuration(q.diff);
                const directionText = q.isAfter ? '後' : '前';

                // --- 問題文と画像の組み立て ---
                let contentHTML = '';
                const textClasses = "text-lg editable whitespace-nowrap";

                if (display === 'text') {
                    contentHTML = `
                        <div class="flex items-center mb-3 w-full">
                            <div class="text-lg editable mr-2 flex-shrink-0" contenteditable="true">(${q.id})</div>
                            <div class="${textClasses}" contenteditable="true">
                                ${timeAText}の、${diffText}${directionText}は何時何分でしょう？
                            </div>
                        </div>
                    `;
                } else if (display === 'both') {
                    contentHTML = `
                        <div class="flex items-center gap-4 mb-3 w-full">
                            <div class="text-lg editable flex-shrink-0" contenteditable="true">(${q.id})</div>
                            <div class="w-[110px] h-[110px] flex-shrink-0">${createClockSVG(q.timeA.h, q.timeA.m)}</div>
                            <div class="${textClasses}" contenteditable="true">
                                ${timeAText}の、${diffText}${directionText}は何時何分でしょう？
                            </div>
                        </div>
                    `;
                } else if (display === 'clock') {
                    contentHTML = `
                        <div class="flex items-center gap-4 mb-3 w-full">
                            <div class="text-lg editable flex-shrink-0" contenteditable="true">(${q.id})</div>
                            <div class="w-[110px] h-[110px] flex-shrink-0">${createClockSVG(q.timeA.h, q.timeA.m)}</div>
                            <div class="${textClasses}" contenteditable="true">
                                この時刻の、${diffText}${directionText}は何時何分でしょう？
                            </div>
                        </div>
                    `;
                }

                // --- 解答エリア ---
                let answerArea = '';
                const answerAreaClasses = "mt-4 w-full pl-8"; // 番号の幅分くらいインデント

                if (format === 'write') {
                    answerArea = `
                        <div class="${answerAreaClasses} text-lg flex items-end">
                            <span class="editable" contenteditable="true">答え：</span>
                            <span class="answer-line"></span>
                        </div>`;
                } else if (format === 'choice2') {
                    // 2択式：正解と不正解を1つずつ抽出してシャッフル
                    const correctStr = formatTime(q.timeB.h, q.timeB.m);
                    const wrongChoice = q.choices.find(c => c !== correctStr);
                    const choicesForRender = [correctStr, wrongChoice].sort(() => Math.random() - 0.5);
                    const labels = ['ア', 'イ'];
                    
                    let choicesHTML = '';
                    choicesForRender.forEach((choice, index) => {
                        choicesHTML += `<span class="editable whitespace-nowrap" contenteditable="true">${labels[index]}：${choice}</span>`;
                    });
                    
                    answerArea = `
                        <div class="${answerAreaClasses} grid grid-cols-2 gap-4 text-lg font-medium">
                            ${choicesHTML}
                        </div>`;
                } else {
                    // 4択式
                    const labels = ['ア', 'イ', 'ウ', 'エ'];
                    let choicesHTML = '';
                    q.choices.forEach((choice, index) => {
                        choicesHTML += `<span class="editable whitespace-nowrap" contenteditable="true">${labels[index]}：${choice}</span>`;
                    });
                    
                    answerArea = `
                        <div class="${answerAreaClasses} grid grid-cols-4 gap-4 text-lg font-medium">
                            ${choicesHTML}
                        </div>`;
                }

                qDiv.innerHTML = `
                    ${contentHTML}
                    ${answerArea}
                `;
                container.appendChild(qDiv);
            });
        }

        // HTMLを保存する機能
        function saveHTML() {
            // 現在のラジオボタンの選択状態をHTMLの属性に反映する
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                if (radio.checked) {
                    radio.setAttribute('checked', 'checked');
                } else {
                    radio.removeAttribute('checked');
                }
            });

            // 現在のHTML全体を取得
            const htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
            
            // Blobを作成してダウンロードリンクを生成
            const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = '時刻を求めるプリント.html';
            
            // クリックしてダウンロードを実行
            document.body.appendChild(a);
            a.click();
            
            // クリーンアップ
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ラジオボタン変更時の再描画イベント
        document.querySelectorAll('input[name="format"], input[name="display"]').forEach(el => {
            el.addEventListener('change', () => {
                if (currentQuestionsData.length > 0) {
                    renderWorksheet();
                }
            });
        });

        // 初期表示
        window.onload = generateDataAndRender;
    </script>
</body>
</html>
